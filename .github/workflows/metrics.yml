name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: guihojak
          template: classic
          config_timezone: America/Sao_Paulo
          theme: tokyonight
          
          # Base: Removi "activity" para deixar o card mais limpo.
          base: header, community, repositories, metadata
          
          # --- MELHORIA 1: Badges de Linguagens (Plugin Premium) ---
          # Substitui a lista de % por ícones elegantes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_indepth: yes # Dá mais detalhes sobre as linguagens
          
          # --- MELHORIA 2: Plugins de Conquistas & Hábitos (Correção) ---
          # Ativa o plugin de hábitos (Precisa do Token atualizado no Passo 1)
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_habits_days: 14 # Analisa os últimos 14 dias

          # Ativa o plugin de conquistas (Precisa do Token atualizado no Passo 1)
          plugin_achievements: yes
          plugin_achievements_threshold: C # Mostra mais conquistas (C é mais fácil que B)
          plugin_achievements_display: detailed # Mostra ícones maiores e mais bonitos
          
          filename: github-metrics.svg
