name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: guihojak
          template: classic
          base: "" # Removemos o cabeçalho padrão para não repetir seu nome/bio
          config_timezone: America/Sao_Paulo
          theme: tokyonight
          
          # --- O CALENDÁRIO 3D ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year # Mostra os últimos 6 meses para ficar clean
          
          # --- LINGUAGENS FILTRADAS ---
          plugin_languages: yes
          plugin_languages_ignored: html, css, eiffel, pascal # Filtre o que você não quer destacar
          plugin_languages_details: lines, percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 6
          
          # --- CONQUISTAS (BADGES) ---
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: B
          
          filename: github-metrics.svg
