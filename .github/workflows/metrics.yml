name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: guihojak
          template: classic
          # Base "" remove o cabeçalho que repete seu nome/bio
          base: ""
          config_timezone: America/Sao_Paulo
          theme: tokyonight
          
          # --- O CALENDÁRIO 3D (Substitui a Snake e o gráfico comum) ---
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year 
          
          # --- LINGUAGENS FILTRADAS (Removendo o que polui) ---
          plugin_languages: yes
          plugin_languages_ignored: html, css, pascal, eiffel, euphoria
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 6
          
          # --- TROFÉUS INTEGRADOS (Badges Premium) ---
          plugin_achievements: yes
          plugin_achievements_threshold: B      # Só mostra conquistas relevantes
          plugin_achievements_display: detailed # Estilo medalha
          plugin_achievements_limit: 6
          
          filename: github-metrics.svg
